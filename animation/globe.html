<style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            background: transparent;
        }

        body {
            min-height: 0;
        }

        .globe-stage {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .radar-hub {
            width: min(76vmin, 620px);
            height: min(76vmin, 620px);
        }

        .globe-anchor {
            width: min(42vmin, 300px);
            height: min(42vmin, 300px);
        }

        .radar-sweep {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 219, 233, 0.2) 99%, rgba(0, 219, 233, 0.8) 100%);
            transform-origin: 0 0;
            animation: sweep 4s linear infinite;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes sweep {
            0% { transform: rotate(0deg) translate(-50%, -50%); }
            100% { transform: rotate(360deg) translate(-50%, -50%); }
        }

        .hud-grid {
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .pulse-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .3; transform: scale(1.5); }
        }

        .glow-border {
            box-shadow: inset 0 0 0 1px rgba(0, 219, 233, 0.3);
        }

        .quadrant-clip {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        /* Synchronized Sweep Highlight Logic */
        .quadrant-sync-1 { animation: quad-sweep-1 4s linear infinite; } /* TL: 270-360deg (75%-100%) */
        .quadrant-sync-2 { animation: quad-sweep-2 4s linear infinite; } /* TR: 0-90deg (0%-25%) */
        .quadrant-sync-3 { animation: quad-sweep-3 4s linear infinite; } /* BR: 90-180deg (25%-50%) */
        .quadrant-sync-4 { animation: quad-sweep-4 4s linear infinite; } /* BL: 180-270deg (50%-75%) */

        @keyframes quad-sweep-1 {
            0%, 70%, 100% { background-color: transparent; box-shadow: none; border-color: rgba(0, 219, 233, 0.2); }
            85% { background-color: rgba(0, 219, 233, 0.1); box-shadow: inset 0 0 40px rgba(0, 219, 233, 0.3); border-color: rgba(0, 219, 233, 0.8); }
        }
        @keyframes quad-sweep-2 {
            0%, 25%, 100% { background-color: transparent; box-shadow: none; border-color: rgba(0, 219, 233, 0.2); }
            10% { background-color: rgba(0, 219, 233, 0.1); box-shadow: inset 0 0 40px rgba(0, 219, 233, 0.3); border-color: rgba(0, 219, 233, 0.8); }
        }
        @keyframes quad-sweep-3 {
            0%, 20%, 50%, 100% { background-color: transparent; box-shadow: none; border-color: rgba(0, 219, 233, 0.2); }
            35% { background-color: rgba(0, 219, 233, 0.1); box-shadow: inset 0 0 40px rgba(0, 219, 233, 0.3); border-color: rgba(0, 219, 233, 0.8); }
        }
        @keyframes quad-sweep-4 {
            0%, 45%, 75%, 100% { background-color: transparent; box-shadow: none; border-color: rgba(0, 219, 233, 0.2); }
            60% { background-color: rgba(0, 219, 233, 0.1); box-shadow: inset 0 0 40px rgba(0, 219, 233, 0.3); border-color: rgba(0, 219, 233, 0.8); }
        }

        .quadrant-interactive {
            transition: all 0.3s ease-out;
        }

        .quadrant-interactive:hover {
            background-color: rgba(0, 219, 233, 0.1) !important;
            box-shadow: inset 0 0 40px rgba(0, 219, 233, 0.3) !important;
            border-color: rgba(0, 219, 233, 1) !important;
            animation: none !important;
        }

        .quadrant-interactive .quad-text {
            transition: opacity 0.3s ease-out;
        }

        .quadrant-sync-1 .quad-text { animation: text-sweep-1 4s linear infinite; }
        .quadrant-sync-2 .quad-text { animation: text-sweep-2 4s linear infinite; }
        .quadrant-sync-3 .quad-text { animation: text-sweep-3 4s linear infinite; }
        .quadrant-sync-4 .quad-text { animation: text-sweep-4 4s linear infinite; }

        @keyframes text-sweep-1 { 0%, 70%, 100% { opacity: 0.4; } 85% { opacity: 1; } }
        @keyframes text-sweep-2 { 0%, 25%, 100% { opacity: 0.4; } 10% { opacity: 1; } }
        @keyframes text-sweep-3 { 0%, 20%, 50%, 100% { opacity: 0.4; } 35% { opacity: 1; } }
        @keyframes text-sweep-4 { 0%, 45%, 75%, 100% { opacity: 0.4; } 60% { opacity: 1; } }

        .quadrant-interactive:hover .quad-text {
            opacity: 1 !important;
            animation: none !important;
        }
    </style>
